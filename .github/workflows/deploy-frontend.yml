name: Deploy Frontend

on:
  push:
    branches:
      - master
    paths:
      - 'frontend/**'

permissions:
  id-token: write  # OIDC トークン発行に必要
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          REACT_APP_BFF_URL: ${{ secrets.REACT_APP_BFF_URL }}
          REACT_APP_COGNITO_USER_POOL_ID: ${{ secrets.REACT_APP_COGNITO_USER_POOL_ID }}
          REACT_APP_COGNITO_CLIENT_ID: ${{ secrets.REACT_APP_COGNITO_CLIENT_ID }}
          GENERATE_SOURCEMAP: false
          CI: false
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_FRONTEND_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1  # SPA バケット / CloudFront は us-east-1

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/build s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --exclude "html-content/*" \
            --exclude "course-images/*" \
            --exclude "vector_db/*"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
