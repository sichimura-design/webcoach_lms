name: CI - Test and Build

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master, develop]

env:
  AWS_REGION: ap-northeast-1

jobs:
  # ========================================
  # BFFのテストとビルド
  # ========================================
  test-bff:
    name: Test BFF Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bff-server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: bff-server/package.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint || echo "No lint script"

      - name: Run tests
        run: npm test || echo "No tests yet"

      - name: Build BFF (if applicable)
        run: npm run build || echo "No build step"

  # ========================================
  # API Serverのテストとビルド
  # ========================================
  test-api:
    name: Test API Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: api-server/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff

      - name: Run linter (ruff)
        run: ruff check . || echo "Linting issues found"

      - name: Run tests
        run: pytest --cov=. --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./api-server/coverage.xml
          flags: api-server
          fail_ci_if_error: false

  # ========================================
  # Dockerイメージのビルド（PRでのビルド確認）
  # ========================================
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-bff, test-api]

    strategy:
      matrix:
        service: [nginx, bff-server, api-server, moodle-app]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: false
          tags: ${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========================================
  # セキュリティスキャン
  # ========================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [test-bff, test-api]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
