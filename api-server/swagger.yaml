  /api/moodle/enroll-course/{courseid}:
    post:
      tags:
        - Moodle Courses
      summary: Enroll user in course
      description: |
        Enroll the authenticated user in a course using manual enrollment.

        The authenticated user's Moodle user ID is automatically retrieved from their Cognito JWT token.
        The user will be enrolled with the "Student" role (roleid=5).
      security:
        - bearerAuth: []
      parameters:
        - name: courseid
          in: path
          required: true
          schema:
            type: integer
          description: Course ID to enroll in
          example: 2
      responses:
        '200':
          description: User enrolled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  courseid:
                    type: integer
                    example: 2
                  userid:
                    type: integer
                    description: Moodle user ID of the enrolled user
                    example: 3
                  message:
                    type: string
                    example: "コースに登録されました"
                  result:
                    type: object
                    description: Response from Moodle API
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - Moodle user mapping required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to enroll in course
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/moodle/create-course:
    post:
      tags:
        - Moodle Courses
      summary: Create courses (Admin only)
      description: |
        Bulk create courses in Moodle. This endpoint is restricted to users with the "admin" Cognito group.

        **Required fields for each course:**
        - fullname: Full name of the course
        - shortname: Short name/code for the course (must be unique)
        - categoryid: Category ID where the course will be created

        **Optional fields:**
        - summary: Course description
        - summaryformat: Format of summary (0=MOODLE, 1=HTML, 2=PLAIN, 4=MARKDOWN)
        - format: Course format (topics, weeks, social, etc.)
        - visible: Whether the course is visible (1=visible, 0=hidden)
        - startdate: Unix timestamp for course start date
        - enddate: Unix timestamp for course end date
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - courses
              properties:
                courses:
                  type: array
                  items:
                    type: object
                    required:
                      - fullname
                      - shortname
                      - categoryid
                    properties:
                      fullname:
                        type: string
                        example: "Introduction to Machine Learning"
                      shortname:
                        type: string
                        example: "ML101"
                      categoryid:
                        type: integer
                        example: 1
                      summary:
                        type: string
                        example: "Learn the basics of machine learning"
                      summaryformat:
                        type: integer
                        default: 1
                        example: 1
                      format:
                        type: string
                        default: "topics"
                        example: "topics"
                      visible:
                        type: integer
                        default: 1
                        example: 1
                      startdate:
                        type: integer
                        description: Unix timestamp
                        example: 1704067200
                      enddate:
                        type: integer
                        description: Unix timestamp
                        example: 1735689600
      responses:
        '200':
          description: Courses created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  created:
                    type: integer
                    description: Number of courses created
                    example: 5
                  courses:
                    type: array
                    description: Array of created course objects
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        shortname:
                          type: string
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - admin privileges required
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Forbidden"
                  message:
                    type: string
                    example: "管理者権限が必要です。この操作は管理者のみ実行できます。"
        '500':
          description: Failed to create courses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/admin/cognito-users:
    post:
      tags:
        - Admin
      summary: Create Cognito users (Admin only)
      description: |
        Bulk create users in AWS Cognito. This endpoint is restricted to users with the "admin" Cognito group.

        For each user:
        - A Cognito account will be created
        - A temporary password will be sent to the user's email
        - Optionally, the user can be added to a Cognito group

        **Required fields:**
        - email: User's email address
        - username: Unique username for the user

        **Optional fields:**
        - group: Cognito group name (e.g., "admin", "Teachers", "Students")
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - records
              properties:
                records:
                  type: array
                  items:
                    type: object
                    required:
                      - email
                      - username
                    properties:
                      email:
                        type: string
                        format: email
                        example: "user@example.com"
                      username:
                        type: string
                        example: "testuser01"
                      group:
                        type: string
                        example: "Students"
                        description: "Optional Cognito group to add the user to"
      responses:
        '200':
          description: Users created (may include partial failures)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: True if all users were created successfully
                    example: true
                  recordsProcessed:
                    type: integer
                    description: Number of users successfully created
                    example: 8
                  recordsFailed:
                    type: integer
                    description: Number of users that failed to create
                    example: 2
                  message:
                    type: string
                    example: "8件のユーザーを作成しました（2件失敗）"
                  errors:
                    type: array
                    description: Details of any errors that occurred
                    items:
                      type: object
                      properties:
                        row:
                          type: integer
                          description: Row number in the input array (1-indexed)
                        message:
                          type: string
                          description: Error message
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - admin privileges required
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Forbidden"
                  message:
                    type: string
                    example: "管理者権限が必要です。この操作は管理者のみ実行できます。"
        '500':
          description: Failed to create users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      tags:
        - Admin
      summary: List Cognito users (Admin only)
      description: |
        Get a list of all users in the Cognito User Pool. This endpoint is restricted to users with the "admin" Cognito group.

        Returns up to 60 users per request.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User list retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      type: object
                      properties:
                        username:
                          type: string
                          example: "testuser01"
                        email:
                          type: string
                          example: "user@example.com"
                        status:
                          type: string
                          description: "User status (CONFIRMED, FORCE_CHANGE_PASSWORD, etc.)"
                          example: "CONFIRMED"
                        enabled:
                          type: boolean
                          example: true
                        createdAt:
                          type: string
                          format: date-time
                          example: "2024-01-15T10:30:00Z"
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - admin privileges required
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Forbidden"
                  message:
                    type: string
                    example: "管理者権限が必要です。この操作は管理者のみ実行できます。"
        '500':
          description: Failed to list users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
