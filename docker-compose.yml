version: '3.8'

services:
  # フロントエンド（React SPA）
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: moodle-spa-frontend
    ports:
      - "3000:3000"
    environment:
      # EC2上のサービスに接続するための環境変数
      REACT_APP_MOODLE_URL: ${MOODLE_URL:-http://localhost:80}
      REACT_APP_API_SERVER_URL: ${API_SERVER_URL:-http://localhost:8001}
      REACT_APP_BFF_URL: ${BFF_URL:-http://localhost:3001}
      # ChromaDB経由でのセマンティック検索
      REACT_APP_CHROMADB_ENABLED: ${CHROMADB_ENABLED:-true}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # BFFサーバー（Backend for Frontend）
  bff-server:
    build:
      context: ./bff-server
      dockerfile: Dockerfile
    container_name: moodle-spa-bff
    ports:
      - "3001:3001"
    environment:
      # EC2上のMoodleとAPI ServerへのプロキシURL
      MOODLE_URL: ${MOODLE_URL:-http://localhost:80}
      API_SERVER_URL: ${API_SERVER_URL:-http://localhost:8001}
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-production}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
