openapi: 3.0.3
info:
  title: Moodle BFF API
  description: Backend For Frontend API for Moodle integration
  version: 1.0.0
  contact:
    name: Moodle BFF API Support

servers:
  - url: https://52.194.117.196
    description: Production server (HTTPS via nginx)
  - url: http://52.194.117.196
    description: Development server (HTTP, redirects to HTTPS)
  - url: http://localhost:3001
    description: Local development (direct access)

tags:
  - name: Health
    description: Health check endpoints
  - name: Authentication
    description: User authentication and session management
  - name: Moodle Courses
    description: Moodle course management
  - name: Moodle Files
    description: File upload and management
  - name: Moodle Badges
    description: Badge management
  - name: WebCoach
    description: WEBCOACH AI and learning assistance
  - name: Admin
    description: Admin-only endpoints for user and course management
  - name: Coaching
    description: Coach-Student mapping management

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Cognito JWT認証を使用します。

        1. Cognitoでログインして IDToken を取得
        2. "Authorize" ボタンをクリック
        3. IDToken を入力（"Bearer" プレフィックスは不要）

        トークン取得方法:
        ```bash
        # AWS CLIで取得
        aws cognito-idp initiate-auth \
          --auth-flow USER_PASSWORD_AUTH \
          --client-id 23jacbr6nk4baiftjueddmr4kb \
          --auth-parameters USERNAME=your-email,PASSWORD=your-password \
          --region ap-northeast-1

        # またはスクリプトを使用
        ./get-token.sh your-email your-password
        node test-auth.js your-email your-password
        ```

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        detail:
          type: string

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          format: password
          example: password123
        service:
          type: string
          default: moodle_mobile_app

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
        username:
          type: string
        userId:
          type: integer
        message:
          type: string

    UserInfo:
      type: object
      properties:
        userid:
          type: integer
        username:
          type: string
        firstname:
          type: string
        lastname:
          type: string
        fullname:
          type: string
        email:
          type: string
        userpictureurl:
          type: string

    Course:
      type: object
      properties:
        id:
          type: integer
        fullname:
          type: string
        shortname:
          type: string
        categoryid:
          type: integer
        summary:
          type: string
        startdate:
          type: integer
        enddate:
          type: integer
        visible:
          type: boolean
        progress:
          type: integer
          description: コースの進捗率（0-100%）。アクティビティの完了状況から計算されます。
          example: 75
          minimum: 0
          maximum: 100

    CreateCourseRequest:
      type: object
      required:
        - fullname
        - shortname
        - categoryid
      properties:
        fullname:
          type: string
          example: Introduction to Programming
        shortname:
          type: string
          example: PROG101
        categoryid:
          type: integer
          example: 1
        summary:
          type: string
          example: This course covers basic programming concepts

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        parent:
          type: integer
        coursecount:
          type: integer

    CourseContent:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        visible:
          type: boolean
        summary:
          type: string
        modules:
          type: array
          items:
            type: object

    CreateActivityRequest:
      type: object
      required:
        - modulename
        - name
      properties:
        modulename:
          type: string
          example: assignment
        name:
          type: string
          example: Week 1 Assignment
        section:
          type: integer
          default: 0
        intro:
          type: string
          example: Submit your assignment here

    Badge:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        imageurl:
          type: string

    UserBadge:
      type: object
      properties:
        badgeid:
          type: integer
        userid:
          type: integer
        dateissued:
          type: integer
        uniquehash:
          type: string

    ProfileUpdate:
      type: object
      properties:
        nick_name:
          type: string
          maxLength: 256
          nullable: true
          description: ニックネーム
          example: "たろう"
        self_intro:
          type: string
          nullable: true
          description: 自己紹介文
          example: "プログラミングを学んでいる学生です"
        target_job:
          type: string
          maxLength: 256
          nullable: true
          description: なりたい職業・肩書き
          example: "Webエンジニア"
        ideal_career:
          type: string
          maxLength: 256
          nullable: true
          description: 理想のキャリア
          example: "フルスタックエンジニア"
        today_small_step:
          type: string
          maxLength: 256
          nullable: true
          description: 今日のスモールステップ
          example: "JavaScriptの変数について学習する"
        goal:
          type: string
          nullable: true
          description: 目標
          example: "フルスタックエンジニアになる"
        badge_count:
          type: integer
          minimum: 0
          nullable: true
          description: 獲得バッジ数
          example: 5

    Profile:
      type: object
      required:
        - mdl_user_id
      properties:
        mdl_user_id:
          type: integer
          description: Moodle User ID
          example: 2
        nick_name:
          type: string
          nullable: true
          description: ニックネーム
          example: "たろう"
        self_intro:
          type: string
          nullable: true
          description: 自己紹介文
          example: "プログラミングを学んでいる学生です"
        target_job:
          type: string
          nullable: true
          description: なりたい職業・肩書き
          example: "Webエンジニア"
        ideal_career:
          type: string
          nullable: true
          description: 理想のキャリア
          example: "フルスタックエンジニア"
        today_small_step:
          type: string
          nullable: true
          description: 今日のスモールステップ
          example: "JavaScriptの変数について学習する"
        goal:
          type: string
          nullable: true
          description: 目標
          example: "フルスタックエンジニアになる"
        badge_count:
          type: integer
          nullable: true
          default: 0
          description: 獲得バッジ数
          example: 5

    ResumeCourse:
      type: object
      properties:
        courseid:
          type: integer
          description: コースID
          example: 2
        coursename:
          type: string
          description: コース名
          example: "Introduction to Programming"
        fullname:
          type: string
          description: コースのフルネーム
          example: "Introduction to Programming"
        shortname:
          type: string
          description: コースの短縮名
          example: "PROG101"
        summary:
          type: string
          description: コースの概要
          example: "Learn the basics of programming"
        progress:
          type: integer
          description: コースの進捗率（0-100%）。アクティビティの完了状況から計算されます。
          example: 65
          minimum: 0
          maximum: 100
        last_access_time:
          type: string
          format: date-time
          description: 最終アクセス日時
          example: "2024-01-28T10:30:00Z"

    Roadmap:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        category:
          type: string
        difficulty:
          type: string
        description:
          type: string

    AIRequest:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: ユーザーからのメッセージ
          example: このコースの内容を教えてください
        user_id:
          type: integer
          description: ユーザーID（コンテキスト取得用）
          example: 123
        course_id:
          type: integer
          description: コースID（RAG検索用）
          example: 2
        context:
          type: object
          description: 追加のコンテキスト情報
        max_chunks:
          type: integer
          description: RAGで使用する最大チャンク数
          default: 5
          minimum: 1
          maximum: 20
        use_tools:
          type: boolean
          description: BFF APIツールの使用を許可するか
          default: false

    AIResponse:
      type: object
      properties:
        success:
          type: boolean
          description: 処理成功フラグ
        message:
          type: string
          description: AIからの応答メッセージ
        sources:
          type: array
          description: RAG検索で使用されたソース情報
          items:
            type: object
            properties:
              chunk_index:
                type: integer
              module_name:
                type: string
              filename:
                type: string
              section_name:
                type: string
              similarity:
                type: number
                format: float
        tool_calls:
          type: array
          description: 実行されたツール呼び出し
          items:
            type: object
            properties:
              tool_name:
                type: string
              success:
                type: boolean
              result:
                type: object
              error:
                type: string
        context:
          type: object
          description: 追加のコンテキスト情報
        timestamp:
          type: string
          format: date-time
          description: レスポンスのタイムスタンプ
        suggestions:
          type: array
          items:
            type: string

    UpdateDBRequest:
      type: object
      required:
        - data_type
        - records
      properties:
        data_type:
          type: string
          example: courses
        records:
          type: array
          items:
            type: object

    NextCoachingGoal:
      type: object
      required:
        - mdl_user_id
        - no
        - is_completed
      properties:
        mdl_user_id:
          type: integer
          description: Moodle user ID
          example: 3
        no:
          type: integer
          description: Goal item number
          example: 1
        description:
          type: string
          maxLength: 256
          description: Goal description
          example: "Complete Python basics course"
        is_completed:
          type: integer
          description: Completion flag (0=not completed, 1=completed)
          example: 0

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Check if the BFF server is running
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                  service:
                    type: string
                    example: Moodle BFF
                  environment:
                    type: string
                    example: development

  /api/health:
    get:
      tags:
        - Health
      summary: API health check
      description: Check if the API is running
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  timestamp:
                    type: string
                  service:
                    type: string
                  environment:
                    type: string

  /api/login:
    post:
      tags:
        - Authentication
      summary: User login (DEPRECATED)
      deprecated: true
      description: |
        **DEPRECATED**: このエンドポイントは非推奨です。

        フロントエンドでCognito直接認証を使用してください。

        Cognito認証では、このエンドポイントではなく、
        amazon-cognito-identity-js または AWS Amplify を使用してください。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/logout:
    post:
      tags:
        - Authentication
      summary: User logout (DEPRECATED)
      deprecated: true
      description: |
        **DEPRECATED**: このエンドポイントは非推奨です。

        Cognito JWT認証ではステートレスのため、BFF側でのログアウト処理は不要です。

        フロントエンド側でCognito signOutを実行してください。
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '500':
          description: Logout failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/user/info:
    get:
      tags:
        - Authentication
      summary: Get current user info
      description: Get information about the currently authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User information retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/moodle/courses:
    get:
      tags:
        - Moodle Courses
      summary: Get all courses
      description: Get all courses in the Moodle system
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of all courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Course'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/moodle/courses/{userid}:
    get:
      tags:
        - Moodle Courses
      summary: Get enrolled courses by user ID
      description: Get all courses the specified user is enrolled in, including progress calculated from activity completion status
      security:
        - bearerAuth: []
      parameters:
        - name: userid
          in: path
          required: true
          schema:
            type: integer
          description: User ID
      responses:
        '200':
          description: List of enrolled courses with progress
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Course'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/moodle/courses/search:
    get:
      tags:
        - Moodle Courses
      summary: Search courses
      description: Search for courses by keyword
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
      responses:
        '200':
          description: List of matching courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Course'

  /api/moodle/categories:
    get:
      tags:
        - Moodle Courses
      summary: Get course categories
      description: Get all course categories
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'

  /api/moodle/create-category:
    post:
      tags:
        - Moodle Admin
      summary: Manage course categories - Create/Update/Delete (Admin only)
      description: |
        Create, update, or delete course categories in bulk. Requires admin privileges.

        **Operation flags:**
        - No flags: Create new category
        - `updateFlag: true`: Update existing category (requires `id`)
        - `deleteFlag: true`: Delete existing category (requires `id`)

        The endpoint processes all operations and returns a summary with detailed results.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - categories
              properties:
                categories:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: Category ID (required for update/delete)
                        example: 5
                      name:
                        type: string
                        description: Category name (required for create)
                        example: "Programming"
                      parent:
                        type: integer
                        description: Parent category ID (0 for top level)
                        example: 0
                      idnumber:
                        type: string
                        description: Category ID number
                        example: "CAT001"
                      description:
                        type: string
                        description: Category description
                        example: "Programming courses"
                      descriptionformat:
                        type: integer
                        description: Description format (1=HTML, 0=MOODLE, 2=PLAIN, 4=MARKDOWN)
                        example: 1
                      visible:
                        type: boolean
                        description: Category visibility
                        example: true
                      theme:
                        type: string
                        description: Category theme
                        example: ""
                      updateFlag:
                        type: boolean
                        description: Set to true to update existing category
                        example: false
                      deleteFlag:
                        type: boolean
                        description: Set to true to delete existing category
                        example: false
      responses:
        '200':
          description: Categories processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  created:
                    type: integer
                    description: Number of categories created
                    example: 2
                  updated:
                    type: integer
                    description: Number of categories updated
                    example: 1
                  deleted:
                    type: integer
                    description: Number of categories deleted
                    example: 1
                  categories:
                    type: array
                    description: Processed categories with status
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        status:
                          type: string
                          enum: [created, updated, deleted]
                  errors:
                    type: array
                    description: Errors encountered during processing
                    items:
                      type: object
                      properties:
                        operation:
                          type: string
                        message:
                          type: string
        '400':
          description: Bad request
        '403':
          description: Admin privileges required

  /api/moodle/courses/{courseid}/contents:
    get:
      tags:
        - Moodle Courses
      summary: Get course contents with page details
      description: |
        Get the contents of a specific course including full page module details.

        For page modules, this endpoint automatically enriches the response with:
        - `description`: Page intro/description text (HTML)
        - `content`: Full page HTML content
        - `descriptionformat`: Format of description (1=HTML)
        - `contentformat`: Format of content (1=HTML)
        - `timemodified`: Last modified timestamp

        Other module types (forum, quiz, etc.) return standard metadata only.
      security:
        - bearerAuth: []
      parameters:
        - name: courseid
          in: path
          required: true
          schema:
            type: integer
          description: Course ID
      responses:
        '200':
          description: Course contents with enriched page module data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CourseContent'

  /api/moodle/courses/{courseid}/activities:
    post:
      tags:
        - Moodle Courses
      summary: Create activity
      description: Create a new activity in a course
      security:
        - bearerAuth: []
      parameters:
        - name: courseid
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateActivityRequest'
      responses:
        '200':
          description: Activity created successfully
          content:
            application/json:
              schema:
                type: object

  /api/moodle/getcoursebyfield:
    get:
      tags:
        - Moodle Courses
      summary: Get courses by field
      description: |
        Get courses by a specific field value (e.g., category).
        Each course includes tags information retrieved from Moodle's tag system.
      security:
        - bearerAuth: []
      parameters:
        - name: field
          in: query
          required: true
          schema:
            type: string
          example: category
          description: Field name to filter by (e.g., 'category', 'id', 'shortname')
        - name: value
          in: query
          required: true
          schema:
            type: string
          example: 2
          description: Value to match for the specified field
      responses:
        '200':
          description: List of courses matching the field with tags information
          content:
            application/json:
              schema:
                type: object
                properties:
                  courses:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 2
                        fullname:
                          type: string
                          example: "Python Programming Course"
                        shortname:
                          type: string
                          example: "PYTHON101"
                        categoryid:
                          type: integer
                          example: 2
                        tags:
                          type: array
                          description: List of tag names associated with this course
                          items:
                            type: string
                          example: ["Python", "Programming", "Beginner"]
                        courseimage:
                          type: string
                          description: Course image URL (may be custom or Moodle default)
                          example: "https://example.com/images/python-course.jpg"
        '400':
          description: Bad request - missing field or value parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/moodle/files/upload:
    post:
      tags:
        - Moodle Files
      summary: Upload file
      description: Upload a file to Moodle
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                courseid:
                  type: integer
      responses:
        '200':
          description: File uploaded successfully
          content:
            application/json:
              schema:
                type: object

  /api/moodle/api:
    post:
      tags:
        - Moodle Courses
      summary: Generic Moodle API call
      description: Make a generic call to any Moodle web service function
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - wsfunction
              properties:
                wsfunction:
                  type: string
                  example: core_course_get_courses
                params:
                  type: object
      responses:
        '200':
          description: API call successful
          content:
            application/json:
              schema:
                type: object

  /api/moodle/course-image:
    get:
      tags:
        - Moodle Courses
      summary: Get course image
      description: Proxy endpoint to fetch course images from Moodle. Receives a Moodle image URL, fetches the image, and returns it as a Base64-encoded data URL for easy display in the frontend.
      parameters:
        - name: imageUrl
          in: query
          required: true
          schema:
            type: string
          description: The Moodle image URL (can be absolute or relative path)
          example: "http://moodle-app:8080/pluginfile.php/23/course/overviewfiles/screenshot.png"
      responses:
        '200':
          description: Image fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  imageUrl:
                    type: string
                    description: Base64-encoded data URL of the image
                    example: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAUA..."
                  contentType:
                    type: string
                    description: MIME type of the image
                    example: "image/png"
                  size:
                    type: integer
                    description: Size of the image in bytes
                    example: 12345
        '400':
          description: Bad request - imageUrl parameter is missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Image not found
          content:
            application/json:
