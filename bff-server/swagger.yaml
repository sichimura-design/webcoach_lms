  /api/moodle/activities/{cmid}/completion:
    get:
      tags:
        - Moodle Courses
      summary: Get activity completion status
      description: |
        Get the completion status of a specific activity for the authenticated user.

        **Requirements:**
        - User must be enrolled in the course
        - courseid query parameter is required to fetch completion data
      security:
        - bearerAuth: []
      parameters:
        - name: cmid
          in: path
          required: true
          schema:
            type: integer
          description: Course Module ID (Activity ID)
          example: 123
        - name: courseid
          in: query
          required: true
          schema:
            type: integer
          description: Course ID containing the activity
          example: 2
      responses:
        '200':
          description: Activity completion status retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  cmid:
                    type: integer
                    description: Course Module ID
                    example: 123
                  modname:
                    type: string
                    description: Module name (e.g., 'page', 'quiz', 'forum')
                    example: "page"
                  instance:
                    type: integer
                    description: Module instance ID
                    example: 45
                  state:
                    type: integer
                    description: Completion state (0=incomplete, 1=complete, 2=complete pass, 3=complete fail)
                    example: 1
                  timecompleted:
                    type: integer
                    description: Unix timestamp when completed (0 if not completed)
                    example: 1679500800
                  tracking:
                    type: integer
                    description: Tracking type (0=none, 1=manual, 2=automatic)
                    example: 1
                  overrideby:
                    type: integer
                    description: User ID who overrode the completion (0 if not overridden)
                    example: 0
                  valueused:
                    type: boolean
                    description: Whether the completion is used
                    example: true
        '400':
          description: Bad request - courseid query parameter missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Activity not found in the specified course
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to get completion status
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to get activity completion status"
                  message:
                    type: string

    post:
      tags:
        - Moodle Courses
      summary: Update activity completion status
      description: |
        Manually update the completion status of an activity for the authenticated user.

        **Requirements:**
        - The activity must have manual completion tracking enabled
        - User must have the 'moodle/course:togglecompletion' capability
        - Only works for the authenticated user's own completion status
      security:
        - bearerAuth: []
      parameters:
        - name: cmid
          in: path
          required: true
          schema:
            type: integer
          description: Course Module ID (Activity ID)
          example: 123
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - completed
              properties:
                completed:
                  type: boolean
                  description: Mark activity as completed (true) or incomplete (false)
                  example: true
      responses:
        '200':
          description: Completion status updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    description: Success status
                    example: true
                  warnings:
                    type: array
                    description: Any warnings from Moodle
                    items:
                      type: object
        '400':
          description: Bad request - invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to update completion status
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to update activity completion"
                  message:
                    type: string
                    example: "Activity does not have manual completion enabled"

