  /api/webcoach/avatars:
    post:
      tags:
        - WebCoach
      summary: Manage avatars - Create/Update/Delete
      description: |
        Create, update, or delete avatars in bulk.

        **Operation flags:**
        - No flags: Create new avatar
        - `updateFlag: true`: Update existing avatar (requires `avatar_id`)
        - `deleteFlag: true`: Delete existing avatar (requires `avatar_id`)

        **Required fields for create:**
        - url: Avatar image URL

        **Required fields for update:**
        - avatar_id: Avatar ID
        - url: New avatar image URL

        **Required fields for delete:**
        - avatar_id: Avatar ID

        The endpoint processes all operations and returns a summary with detailed results.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - avatars
              properties:
                avatars:
                  type: array
                  items:
                    type: object
                    properties:
                      avatar_id:
                        type: integer
                        description: Avatar ID (required for update/delete)
                        example: 1
                      url:
                        type: string
                        format: uri
                        description: Avatar image URL (required for create/update)
                        example: "https://s3.amazonaws.com/bucket/avatar1.jpg"
                      updateFlag:
                        type: boolean
                        description: Set to true to update existing avatar
                        example: false
                      deleteFlag:
                        type: boolean
                        description: Set to true to delete existing avatar
                        example: false
      responses:
        '200':
          description: Avatars processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  created:
                    type: integer
                    description: Number of avatars created
                    example: 2
                  updated:
                    type: integer
                    description: Number of avatars updated
                    example: 1
                  deleted:
                    type: integer
                    description: Number of avatars deleted
                    example: 1
                  avatars:
                    type: array
                    description: Processed avatars with status
                    items:
                      type: object
                      properties:
                        avatar_id:
                          type: integer
                        url:
                          type: string
                        status:
                          type: string
                          enum: [created, updated, deleted]
                  errors:
                    type: array
                    description: Errors encountered during processing
                    items:
                      type: object
                      properties:
                        operation:
                          type: string
                        avatar_id:
                          type: integer
                        url:
                          type: string
                        message:
                          type: string
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to manage avatars
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
