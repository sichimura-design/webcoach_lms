                  type: string
                  description: 関連するコース名（オプション）
                  example: "Introduction to Programming"
                module_name:
                  type: string
                  description: モジュール名（オプション）
                  example: "Lesson 1"
                chunk_size:
                  type: integer
                  description: テキストのチャンクサイズ
                  default: 1000
                  minimum: 100
                  maximum: 5000
                chunk_overlap:
                  type: integer
                  description: チャンクのオーバーラップサイズ
                  default: 200
                  minimum: 0
                  maximum: 1000
      responses:
        '200':
          description: Today's HTML files ingested successfully
