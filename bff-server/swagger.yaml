  /api/webcoach/faiss/ingest-html:
    post:
      tags:
        - WebCoach
      summary: Ingest specific HTML files from S3 to FAISS
      description: |
        S3に保存されている特定のHTMLファイルをFAISSベクトルDBに取り込みます。

        処理内容:
        1. 指定されたS3キーのHTMLファイルをダウンロード
        2. HTMLをテキストに変換してチャンク分割
        3. FAISSインデックスに追加
        4. S3に更新したインデックスをアップロード
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - s3_bucket
                - s3_keys
              properties:
                s3_bucket:
                  type: string
                  description: S3バケット名
                  example: "my-bucket"
                s3_keys:
                  type: array
                  description: 取り込むHTMLファイルのS3キーリスト
                  items:
                    type: string
                  example: ["path/to/file1.html", "path/to/file2.html"]
                course_id:
                  type: integer
                  description: 関連するコースID（オプション）
                  example: 2
                course_name:
                  type: string
                  description: 関連するコース名（オプション）
                  example: "Introduction to Programming"
                module_name:
                  type: string
                  description: モジュール名（オプション）
                  example: "Lesson 1"
                chunk_size:
                  type: integer
                  description: テキストのチャンクサイズ
                  default: 1000
                  minimum: 100
                  maximum: 5000
                chunk_overlap:
                  type: integer
                  description: チャンクのオーバーラップサイズ
                  default: 200
                  minimum: 0
                  maximum: 1000
      responses:
        '200':
          description: HTML files ingested successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  files_processed:
                    type: integer
                  documents_added:
                    type: integer
                  faiss_total_vectors:
                    type: integer
                  errors:
                    type: array
                    items:
                      type: string
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to ingest HTML files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/webcoach/faiss/ingest-prefix:
    post:
      tags:
        - WebCoach
      summary: Ingest all HTML files from S3 prefix to FAISS
      description: |
        S3の特定プレフィックス配下のすべてのHTMLファイルをFAISSベクトルDBに一括取り込みます。

        処理内容:
        1. S3プレフィックス配下のHTMLファイルをリストアップ
        2. 各ファイルをダウンロードしてテキストに変換
        3. FAISSインデックスに追加
        4. S3に更新したインデックスをアップロード
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - s3_bucket
                - s3_prefix
              properties:
                s3_bucket:
                  type: string
                  description: S3バケット名
                  example: "my-bucket"
                s3_prefix:
                  type: string
                  description: HTMLファイルが格納されているS3プレフィックス
                  example: "html_files/"
                course_id:
                  type: integer
                  description: 関連するコースID（オプション）
                  example: 2
                course_name:
                  type: string
                  description: 関連するコース名（オプション）
                  example: "Introduction to Programming"
                module_name:
                  type: string
                  description: モジュール名（オプション）
                  example: "Lesson 1"
