          description: コーチのMoodleユーザーID
        - name: student_user_id
          in: path
          required: true
          schema:
            type: integer
          description: 受講生のMoodleユーザーID
        - name: include_deleted
          in: query
          schema:
            type: boolean
            default: false
          description: 削除済みも含めるか
      responses:
        '200':
          description: マッピング取得成功
          content:
            application/json:
              schema:
                type: object
