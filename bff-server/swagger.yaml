  /api/moodle/create-course:
    post:
      tags:
        - Moodle Courses
      summary: Manage courses - Create/Update/Delete (Admin only)
      description: |
        Create, update, or delete courses in bulk. This endpoint is restricted to users with the "admin" Cognito group.

        **Operation flags:**
        - No flags: Create new course
        - `updateFlag: true`: Update existing course (requires `id`)
        - `deleteFlag: true`: Delete existing course (requires `id`)

        **Required fields for create:**
        - fullname: Full name of the course
        - shortname: Short name/code for the course (must be unique)
        - categoryid: Category ID where the course will be created

        **Required fields for update/delete:**
        - id: Course ID

        **Optional fields:**
        - summary: Course description
        - summaryformat: Format of summary (0=MOODLE, 1=HTML, 2=PLAIN, 4=MARKDOWN)
        - format: Course format (topics, weeks, social, etc.)
        - visible: Whether the course is visible (1=visible, 0=hidden)
        - startdate: Unix timestamp for course start date
        - enddate: Unix timestamp for course end date
        - imageUrl: URL of course icon/image (will be downloaded and uploaded to Moodle)
        - tag: Tag name to associate with the course (applied after course creation)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - courses
              properties:
                courses:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: Course ID (required for update/delete)
                        example: 10
                      fullname:
                        type: string
                        description: Full name (required for create)
                        example: "Introduction to Machine Learning"
                      shortname:
                        type: string
                        description: Short name (required for create)
                        example: "ML101"
                      categoryid:
                        type: integer
                        description: Category ID (required for create)
                        example: 1
                      summary:
                        type: string
                        example: "Learn the basics of machine learning"
                      summaryformat:
                        type: integer
                        default: 1
                        example: 1
                      format:
                        type: string
                        default: "topics"
                        example: "topics"
                      visible:
                        type: integer
                        default: 1
                        example: 1
                      startdate:
                        type: integer
                        description: Unix timestamp
                        example: 1704067200
                      enddate:
                        type: integer
                        description: Unix timestamp
                        example: 1735689600
                      imageUrl:
                        type: string
                        format: uri
                        description: URL of course icon/image (will be downloaded and uploaded to Moodle)
                        example: "https://example.com/images/course-icon.jpg"
                      tag:
                        type: string
                        description: Tag to associate with the course (applied after course creation)
                        example: "Python"
                      updateFlag:
                        type: boolean
                        description: Set to true to update existing course
                        example: false
                      deleteFlag:
                        type: boolean
                        description: Set to true to delete existing course
                        example: false
      responses:
        '200':
          description: Courses processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  created:
                    type: integer
                    description: Number of courses created
                    example: 3
                  updated:
                    type: integer
                    description: Number of courses updated
                    example: 2
                  deleted:
                    type: integer
                    description: Number of courses deleted
                    example: 1
                  courses:
                    type: array
                    description: Processed courses with status
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        shortname:
                          type: string
                        status:
                          type: string
                          enum: [created, updated, deleted]
                  errors:
                    type: array
                    description: Errors encountered during processing
                    items:
                      type: object
                      properties:
                        operation:
                          type: string
                        message:
                          type: string
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - admin privileges required
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Forbidden"
                  message:
                    type: string
                    example: "管理者権限が必要です。この操作は管理者のみ実行できます。"
        '500':
          description: Failed to create courses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/admin/cognito-users:
    post:
      tags:
        - Admin
      summary: Create/Delete Cognito users (Admin only)
      description: |
        Bulk create or delete users in AWS Cognito. This endpoint is restricted to users with the "admin" Cognito group.

        **For creating users:**
        - A Cognito account will be created
        - A temporary password will be sent to the user's email
        - Optionally, the user can be added to a Cognito group

        **For deleting users:**
        - Set `deleteFlag: true` in the record
        - Only email or username is required for deletion

        **Required fields (create):**
        - email: User's email address
        - username: Unique username for the user

        **Required fields (delete):**
        - email or username: To identify the user to delete
        - deleteFlag: true

        **Optional fields:**
        - group: Cognito group name (e.g., "admin", "Teachers", "Students")
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - records
              properties:
                records:
                  type: array
                  items:
                    type: object
                    properties:
                      email:
                        type: string
                        format: email
                        example: "user@example.com"
                      username:
                        type: string
                        example: "testuser01"
                      group:
                        type: string
                        example: "Students"
                        description: "Optional Cognito group to add the user to"
                      deleteFlag:
                        type: boolean
                        example: false
                        description: "Set to true to delete the user instead of creating"
      responses:
        '200':
          description: Users created/deleted (may include partial failures)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: True if all operations were successful
                    example: true
                  recordsProcessed:
                    type: integer
                    description: Number of users successfully created or deleted
                    example: 8
                  recordsDeleted:
                    type: integer
                    description: Number of users successfully deleted
                    example: 2
                  recordsFailed:
                    type: integer
                    description: Number of users that failed to process
                    example: 0
                  message:
                    type: string
                    example: "6件のユーザーを作成、2件のユーザーを削除しました"
                  errors:
                    type: array
                    description: Details of any errors that occurred
                    items:
                      type: object
                      properties:
                        row:
                          type: integer
                          description: Row number in the input array (1-indexed)
                        message:
                          type: string
                          description: Error message
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - admin privileges required
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Forbidden"
                  message:
                    type: string
                    example: "管理者権限が必要です。この操作は管理者のみ実行できます。"
        '500':
          description: Failed to create users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      tags:
        - Admin
      summary: List all Cognito users with groups (Admin only)
      description: |
        Get a complete list of all users in the Cognito User Pool with their group memberships.
        This endpoint is restricted to users with the "admin" Cognito group.

        Features:
        - Fetches ALL users with pagination support (no 60-user limit)
        - Efficiently retrieves group memberships by querying groups first, then members
        - Avoids per-user API calls for better performance

        Note: For large user pools, this operation may take several seconds.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User list with groups retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      type: object
                      properties:
                        username:
                          type: string
                          example: "testuser01"
                        email:
                          type: string
                          example: "user@example.com"
                        status:
                          type: string
                          description: "User status (CONFIRMED, FORCE_CHANGE_PASSWORD, etc.)"
                          example: "CONFIRMED"
                        enabled:
                          type: boolean
                          example: true
                        createdAt:
                          type: string
                          format: date-time
                          example: "2024-01-15T10:30:00Z"
                        groups:
                          type: array
                          description: "List of Cognito groups this user belongs to"
                          items:
                            type: string
                          example: ["Students", "premium-users"]
                  total:
                    type: integer
                    description: "Total number of users retrieved"
                    example: 150
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - admin privileges required
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Forbidden"
                  message:
                    type: string
                    example: "管理者権限が必要です。この操作は管理者のみ実行できます。"
        '500':
          description: Failed to list users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/admin/students:
    get:
      tags:
        - Admin
      summary: List students from Cognito 'student' group with last login information (Admin/Coach)
      description: |
        Get a list of students from Cognito 'student' group with their Moodle last login information.
        Admin: returns all students in 'student' group
        Coach: returns only assigned students from 'student' group

        **Note:** This endpoint now only returns users who are in the Cognito 'student' group,
        excluding users with 'admin' or 'coach' roles.

        Features:
        - Fetches users from Cognito 'student' group
        - Enriches with Moodle user information
        - Calculates formatted last access time (e.g., "5分前", "3時間前", "7日前")
        - Provides flags for inactive users and new users
        - Returns statistics summary

        Flags:
        - `inactive_over_month`: true if user hasn't logged in for over 30 days (or never logged in)
        - `new_user`: true if user account was created within the last 30 days

        Results are sorted by most recent access first.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Student list retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  students:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: Moodle user ID
                          example: 3
                        username:
                          type: string
                          example: "student01"
                        email:
                          type: string
                          example: "student01@example.com"
                        firstname:
                          type: string
                          example: "太郎"
                        lastname:
                          type: string
                          example: "山田"
                        fullname:
                          type: string
                          example: "山田 太郎"
                        lastaccess:
                          type: integer
                          description: Last access timestamp (Unix seconds, 0 if never logged in)
                          example: 1735689600
                        lastaccess_formatted:
                          type: string
                          description: Human-readable last access time
                          example: "5分前"
                        firstaccess:
                          type: integer
                          description: First access timestamp (Unix seconds)
                          example: 1704067200
                        suspended:
                          type: boolean
                          description: Whether the user is suspended
                          example: false
                        auth:
                          type: string
                          description: Authentication method
                          example: "manual"
                        inactive_over_month:
                          type: boolean
                          description: True if user hasn't logged in for over 30 days or never logged in
                          example: false
                        new_user:
                          type: boolean
                          description: True if user account was created within the last 30 days
                          example: true
                  stats:
                    type: object
                    description: Summary statistics
                    properties:
                      total:
                        type: integer
                        description: Total number of students
                        example: 50
                      inactive_over_month:
                        type: integer
                        description: Number of students inactive for over 1 month
                        example: 12
                      new_users:
                        type: integer
                        description: Number of new users (created within last month)
                        example: 8
                      never_logged_in:
                        type: integer
                        description: Number of users who never logged in
                        example: 3
                  timestamp:
                    type: string
                    format: date-time
                    description: Timestamp when this data was retrieved
                    example: "2024-01-15T10:30:00Z"
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - admin privileges required
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Forbidden"
                  message:
                    type: string
                    example: "管理者権限が必要です。この操作は管理者のみ実行できます。"
        '500':
          description: Failed to fetch students
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ==================== COACHING ENDPOINTS ====================

  /api/coaching/manage-mappings:
    post:
      tags:
        - Coaching
      summary: コーチと受講生のマッピング一括管理
      description: |
        コーチと受講生のマッピングを一括で作成/更新/削除します（管理者のみ）

        deleteFlagとupdateFlagの使用:
        - deleteFlag=true: マッピングを削除
        - updateFlag=true (deleteFlag=false): マッピングを復元
        - 両方false: 新規マッピング作成
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - mappings
              properties:
                mappings:
                  type: array
                  items:
                    type: object
                    required:
                      - coach_user_id
                      - student_user_id
                    properties:
                      coach_user_id:
                        type: integer
                        description: コーチのMoodleユーザーID
                        example: 5
                      student_user_id:
                        type: integer
                        description: 受講生のMoodleユーザーID
                        example: 10
                      deleteFlag:
                        type: integer
                        description: 削除フラグ (1=削除)
                        example: 0
                      updateFlag:
                        type: integer
                        description: 更新フラグ (1=復元)
                        example: 0
      responses:
        '200':
          description: 一括管理成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  created:
                    type: integer
                  updated:
                    type: integer
                  deleted:
                    type: integer
                  mappings:
                    type: array
                    items:
                      type: object
                      properties:
                        coach_user_id:
                          type: integer
                        student_user_id:
                          type: integer
                        status:
                          type: string
                          enum: [created, updated, deleted]
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        operation:
                          type: string
                        coach_user_id:
                          type: integer
                        student_user_id:
                          type: integer
                        message:
                          type: string
        '400':
          description: Bad Request
        '403':
          description: Forbidden - admin privileges required

  /api/coaching/mappings:
    get:
      tags:
        - Coaching
      summary: 全マッピング取得
      description: 全てのコーチと受講生のマッピングを取得します（管理者のみ）
      security:
        - bearerAuth: []
      parameters:
        - name: include_deleted
          in: query
          schema:
            type: boolean
            default: false
          description: 削除済みも含めるか
      responses:
        '200':
          description: マッピング一覧取得成功
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    coach_user_id:
                      type: integer
                      description: コーチのMoodleユーザーID
                    student_user_id:
                      type: integer
                      description: 受講生のMoodleユーザーID
                    logical_deleted:
                      type: integer
                      description: 論理削除フラグ (0=有効, 1=削除済み)
                    created_at:
                      type: string
                      format: date-time
                      description: レコード作成日時
                    updated_at:
                      type: string
                      format: date-time
                      description: レコード更新日時
        '403':
          description: Forbidden - admin privileges required

    post:
      tags:
        - Coaching
      summary: コーチと受講生のマッピング作成
      description: コーチと受講生のマッピングを作成します（管理者のみ）
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - coach_user_id
                - student_user_id
              properties:
                coach_user_id:
                  type: integer
                  description: コーチのMoodleユーザーID
                  example: 5
                student_user_id:
                  type: integer
                  description: 受講生のMoodleユーザーID
                  example: 10
      responses:
        '201':
          description: マッピング作成成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  coach_user_id:
                    type: integer
                  student_user_id:
                    type: integer
                  logical_deleted:
                    type: integer
                  created_at:
                    type: string
                    format: date-time
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - admin privileges required
        '409':
          description: Conflict - mapping already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/coaching/coaches/{coach_user_id}/students:
