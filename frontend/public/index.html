<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WEBCOACH LMS</title>
    <style>
      /* Modal Styles */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1300;
      }

      .modal-content {
        background: white;
        border-radius: 12px;
        max-width: 800px;
        width: 90%;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 24px;
        border-bottom: 1px solid #e0e0e0;
      }

      .modal-header h3 {
        margin: 0;
        font-size: 1.5rem;
        color: #333;
      }

      .close-button {
        background: none;
        border: none;
        font-size: 2rem;
        cursor: pointer;
        color: #666;
        padding: 0;
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
        transition: background-color 0.2s;
      }

      .close-button:hover {
        background-color: #f5f5f5;
      }

      .modal-body {
        padding: 24px;
      }

      .modal-footer {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        padding: 20px 24px;
        border-top: 1px solid #e0e0e0;
      }

      .btn-primary, .btn-secondary {
        padding: 10px 24px;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        border: none;
        transition: all 0.2s;
      }

      .btn-primary {
        background-color: #C62828;
        color: white;
      }

      .btn-primary:hover:not(:disabled) {
        background-color: #8B1A1A;
      }

      .btn-primary:disabled {
        background-color: #cccccc;
        cursor: not-allowed;
      }

      .btn-secondary {
        background-color: #f5f5f5;
        color: #333;
      }

      .btn-secondary:hover {
        background-color: #e0e0e0;
      }

      .add-type-selector {
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }

      .type-btn {
        padding: 10px 16px;
        border: 2px solid #e0e0e0;
        background: white;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.95rem;
        transition: all 0.2s;
      }

      .type-btn:hover {
        border-color: #C62828;
      }

      .type-btn.active {
        background-color: #C62828;
        color: white;
        border-color: #C62828;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: #333;
      }

      .form-group input,
      .form-group select,
      .form-group textarea {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        font-size: 1rem;
        font-family: inherit;
        transition: border-color 0.2s;
      }

      .form-group input:focus,
      .form-group select:focus,
      .form-group textarea:focus {
        outline: none;
        border-color: #C62828;
      }

      .upload-area {
        text-align: center;
        padding: 40px;
        border: 2px dashed #e0e0e0;
        border-radius: 12px;
        margin-bottom: 20px;
      }

      .upload-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 24px;
        background-color: #C62828;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.2s;
      }

      .upload-btn:hover {
        background-color: #8B1A1A;
      }

      .upload-area p {
        margin-top: 12px;
        color: #666;
      }

      .preview {
        background-color: #f5f5f5;
        padding: 16px;
        border-radius: 8px;
        margin-top: 20px;
      }

      .preview h4 {
        margin-top: 0;
        color: #333;
      }

      .content-preview {
        margin-top: 12px;
        padding: 12px;
        background-color: white;
        border-radius: 4px;
      }

      .file-list {
        margin-top: 20px;
      }

      .file-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px;
        background-color: #f5f5f5;
        border-radius: 8px;
        margin-bottom: 8px;
      }

      .remove-file {
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: #666;
        padding: 0 8px;
      }

      .remove-file:hover {
        color: #C62828;
      }

      .alert {
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .alert-error {
        background-color: #ffebee;
        color: #c62828;
        border: 1px solid #ef5350;
      }

      .notion-list-section {
        min-height: 200px;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
